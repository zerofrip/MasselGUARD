name: Installer E2E

# Requires a self-hosted runner with labels: [self-hosted, windows, vm].
# Re-enable pull_request trigger once that runner is provisioned.
on:
  workflow_dispatch:

jobs:
  installer-matrix:
    runs-on: [self-hosted, windows, vm]
    steps:
      - uses: actions/checkout@v4

      - name: Run installer matrix
        shell: pwsh
        run: |
          ./tests/scripts/installer_matrix.ps1 -Scenario all -ReportPath reports/installer-e2e

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: installer-e2e-report
          path: reports/installer-e2e/
